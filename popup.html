<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>VisasPro DS-160</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 11px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 30px; height: 30px; background: #e63946;
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-weight: 800; color: white; font-size: 12px;
      flex-shrink: 0;
    }
    .header h1 { color: white; font-size: 13px; font-weight: 700; }
    .header p  { color: #8892b0; font-size: 10px; }
    .body { padding: 12px; }
    .step-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #718096; margin-bottom: 7px;
    }
    .upload-wrapper {
      position: relative; display: flex; align-items: center; gap: 10px;
      padding: 12px; background: white;
      border: 2px dashed #cbd5e0; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .upload-wrapper:hover { border-color: #e63946; background: #fff5f5; }
    .upload-wrapper input[type="file"] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .upload-icon { font-size: 22px; flex-shrink: 0; }
    .upload-text { font-size: 11px; color: #4a5568; line-height: 1.4; pointer-events: none; }
    .upload-text strong { color: #e63946; display: block; font-size: 12px; margin-bottom: 1px; }
    .progress-wrap { margin-top: 8px; display: none; }
    .progress-text {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #4a5568; margin-bottom: 4px;
    }
    .progress-bar { height: 4px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #e63946, #ff6b6b);
      border-radius: 3px; width: 0%; transition: width 0.3s;
    }
    .alert {
      margin-top: 8px; padding: 8px 10px;
      border-radius: 6px; font-size: 10px; line-height: 1.4; display: none;
    }
    .alert.success { background: #e6f7ee; color: #276749; border-left: 3px solid #38a169; }
    .alert.error   { background: #fde8e8; color: #9b1c1c; border-left: 3px solid #e53e3e; }
    .client-card {
      background: white; border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: none;
    }
    .client-card-header {
      background: #e63946; padding: 8px 12px;
      display: flex; align-items: center; gap: 9px;
    }
    .avatar {
      width: 30px; height: 30px; background: rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 800; font-size: 12px;
      flex-shrink: 0;
    }
    .client-name { color: white; font-size: 12px; font-weight: 700; }
    .client-sub  { color: rgba(255,255,255,0.75); font-size: 10px; }
    .data-grid {
      padding: 8px 12px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .data-item .lbl {
      font-size: 8px; text-transform: uppercase;
      letter-spacing: 0.4px; color: #a0aec0;
    }
    .data-item .val {
      font-size: 10px; font-weight: 600; color: #1a1a2e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .divider { height: 1px; background: #f0f0f0; margin: 0 12px; }
    .sections { padding: 8px 12px; }
    .sections-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #718096; margin-bottom: 6px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .btn-section {
      padding: 6px 8px; text-align: center;
      background: #f7f8ff; border: 1px solid #e2e8f0;
      border-radius: 5px; font-size: 10px; color: #2d3748;
      cursor: pointer; font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .btn-section:hover { background: #e63946; color: white; border-color: #e63946; }
    .btn-section.full { grid-column: span 2; }
    .btn-clear {
      width: calc(100% - 24px); margin: 6px 12px 10px;
      padding: 6px; background: #f7f8ff;
      border: 1px solid #e2e8f0; border-radius: 5px;
      font-size: 10px; color: #718096; cursor: pointer;
    }
    .btn-clear:hover { background: #edf2f7; }
    .footer { text-align: center; padding: 6px; font-size: 9px; color: #a0aec0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">VP</div>
    <div>
      <h1>VisasPro DS-160</h1>
      <p>Cargador de datos del cliente</p>
    </div>
  </div>

  <div class="body">

    <div id="step1">
      <div class="step-label">Paso 1 — Cargar PDF del cliente</div>
      <div class="upload-wrapper">
        <input type="file" id="pdf-input" accept=".pdf" />
        <span class="upload-icon">📂</span>
        <span class="upload-text">
          <strong>Seleccionar PDF</strong>
          Formulario VisasPro del cliente
        </span>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-text">
          <span id="progress-msg">Procesando...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="alert" id="alert"></div>

    <div class="client-card" id="client-card">
      <div class="client-card-header">
        <div class="avatar" id="avatar">?</div>
        <div>
          <div class="client-name" id="client-name">—</div>
          <div class="client-sub"  id="client-sub">—</div>
        </div>
      </div>

      <div class="data-grid" id="data-grid"></div>
      <div class="divider"></div>

      <div class="sections">
        <div class="sections-label">Secciones DS-160</div>
        <div class="btn-grid">
          <button class="btn-section" id="btn-pi1">Personal Info 1</button>
          <button class="btn-section" id="btn-pi2">Personal Info 2</button>
          <button class="btn-section" id="btn-travel">Información de Viaje</button>
          <button class="btn-section" id="btn-companions">Acompañantes</button>
          <button class="btn-section" id="btn-prevtravel">Viajes Previos</button>
          <button class="btn-section" id="btn-address">Dirección</button>
          <button class="btn-section" id="btn-passport">Pasaporte</button>
          <button class="btn-section" id="btn-contact">Contacto en EUA</button>
          <button class="btn-section" id="btn-family">Familia</button>
          <button class="btn-section" id="btn-spouse">Pareja</button>
          <button class="btn-section" id="btn-work">Trabajo actual</button>
          <button class="btn-section" id="btn-workprev">Trabajo anterior</button>
          <button class="btn-section full" id="btn-security">Adicional / Seguridad</button>
        </div>
      </div>

      <div class="divider"></div>
      <button class="btn-clear" id="btn-clear">Limpiar y cargar otro cliente</button>
    </div>

  </div>

  <div class="footer">VisasPro © 2026</div>

  <script src="mappings.js"></script>
  <script src="popup.js"></script>

</body>
</html>
